
<!DOCTYPE html>

<head>

    <title>FLOK STUDIO - Estetika & Luksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
          --primary-color: #E91254;
          --secondary-color: #000000;
          --h1-size: 9.5rem;
          --h2-size: 7.5rem;
          --h3-size: 4rem;
          --text-size: 1rem;
          --menu-size: 10px;
        }

        body { 
          font-family: 'Inter', sans-serif; 
          background-color: #000000;
          color: white;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .transition-soft { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }
        
        .animate-fadeIn { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }

        /* Live Edit Mode Visual Cues */
        [contenteditable="true"]:hover {
          outline: 2px dashed var(--primary-color);
          outline-offset: 4px;
        }
        [contenteditable="true"]:focus {
          outline: 2px solid var(--primary-color);
          outline-offset: 4px;
          background: rgba(233, 18, 84, 0.1);
        }

        .modular-glow:hover {
          box-shadow: 0 0 30px rgba(233, 18, 84, 0.4);
        }

        /* Dynamic CSS Logic */
        .text-primary { color: var(--primary-color); }
        .bg-primary { background-color: var(--primary-color); }
        .border-primary { border-color: var(--primary-color); }
    </style>
